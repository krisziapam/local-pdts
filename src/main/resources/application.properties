spring.application.name=PDTS

# Local MySQL configuration for VS Code + MySQL Workbench
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pdts_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila}
spring.datasource.username=${DATABASE_USERNAME:pdts_user}
spring.datasource.password=${DATABASE_PASSWORD:pdts_local_2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Keep ddl-auto=none because the database is created through database/01_schema_mysql.sql.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
pdts.upload-dir=uploads

# PDTS Application Settings
pdts.bcrypt-strength=10
pdts.token-expiry-days=30
pdts.portal.rate-limit=10
pdts.portal.block-after-failures=5
pdts.portal.block-window-minutes=15
pdts.portal.block-duration-minutes=30

# Email through Resend HTTP API.
# Leave RESEND_API_KEY blank for local database-only testing; email features will fail until configured.
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:PDTS Registrar <no-reply@example.edu>}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
